<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}
        <title>My Blog | {{title}} </title>
    {% else %}
        <title>My Blog </title>
    {% endif %}
</head>
<body>
    <div class="container">

        <form method="post" enctype="multipart/form-data" action="{{ url_for('update_user_by_username', username=username) }}">
            <div class="form-group">
            <label >Photo</label>
                <div class="form-group">
                    <img class="rounded-circle mt-4" style="width: 200px;" src="{{ url_for('static', filename=profile_photo) }}" alt="DP">
                </div>
            </div>

            
            <div class="form-group">
            <label >Name</label>
                <input class="form-control" id="name" name="name" value="{{ name }}">
            </div>

            <div class="form-group">
            <label >Username</label>
            <input class="form-control" id="username" name="username" aria-describedby="emailHelp" value="{{ username }}">
            </div>

            <div class="form-group">
            <label >Mail</label>
            <input class="form-control" id="email" name="email" aria-describedby="emailHelp" value="{{ email }}">
            </div>

            <div class="form-group">
            <label >Password</label>
            <input class="form-control" id="email" name="password" type="password">
            </div>
            
            <div class="form-group">
                <label>Pofile Photo</label>
                <input type="file" class="form-control" id="photo" name="photo" >
            </div>
            
            <button type="submit" class="btn btn-primary">Submit</button>

        </form>
        <div>
    </div>
</body>
</html>
