{% extends "blog_web/base.html" %}

{% block title %}Write a Post | Blog App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">Create New Post</h3>

                <form method="POST" action="/write_post">
                    
                    <!-- Title -->
                    <div class="mb-3">
                        <label for="title" class="form-label">Post Title</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="title" 
                            name="title" 
                            placeholder="Enter post title" 
                            required>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label for="description" class="form-label">Post Content</label>
                        <textarea 
                            class="form-control" 
                            id="description" 
                            name="description" 
                            rows="6" 
                            placeholder="Write your post here..." 
                            required></textarea>
                    </div>

                    <!-- Submit -->
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Publish</button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
